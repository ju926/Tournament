<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Elite Efootball League</title>
<style>
body{
    font-family: Arial;
    background:#0b1220;
    color:white;
    margin:0;
}
h1{
    background:#ef233c;
    padding:15px;
    margin:0;
    text-align:center;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
th,td{
    padding:10px;
    border-bottom:1px solid #333;
    text-align:center;
}
th{background:#111;}
.card{
    padding:15px;
}
.match{
    background:#111;
    padding:10px;
    margin:5px 0;
}
</style>
</head>
<body>

<h1>⚽ ELITE EFOOTBALL LEAGUE</h1>

<div class="card">
<h2>Standings</h2>
<table>
<thead>
<tr>
<th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<div class="card">
<h2>Matchday 1 Results</h2>
<div id="history"></div>
</div>

<script>

const teams=[
"JUKI NAPOLI","CKEVO","ROMTETENASI","ABDNSR","IBRAAH",
"ALVARO CARERAS","CHUCKUMAN","LBNMD","MUFASA",
"CRIEZ16","CENTRYGAMER","BLACK ROSE",
"DERICK MULTITASKER","HUNTER LOVE"
];

let data={};
teams.forEach(t=>{
data[t]={P:0,W:0,D:0,L:0,GF:0,GA:0,PTS:0};
});

// RESULTS
let matches=[
["DERICK MULTITASKER","CKEVO",1,0],
["ALVARO CARERAS","MUFASA",3,0],
["CENTRYGAMER","ABDNSR",3,0],
["BLACK ROSE","ROMTETENASI",9,0]
];

// Apply results
matches.forEach(m=>{
let [a,b,sa,sb]=m;

data[a].P++; data[b].P++;
data[a].GF+=sa; data[a].GA+=sb;
data[b].GF+=sb; data[b].GA+=sa;

if(sa>sb){
data[a].W++; data[b].L++;
data[a].PTS+=3;
}else if(sb>sa){
data[b].W++; data[a].L++;
data[b].PTS+=3;
}else{
data[a].D++; data[b].D++;
data[a].PTS++; data[b].PTS++;
}
});

// Render table
let table=document.getElementById("table");

Object.entries(data)
.sort((a,b)=>b[1].PTS-a[1].PTS)
.forEach(([name,s])=>{
let gd=s.GF-s.GA;
table.innerHTML+=`
<tr>
<td>${name}</td>
<td>${s.P}</td>
<td>${s.W}</td>
<td>${s.D}</td>
<td>${s.L}</td>
<td>${gd}</td>
<td>${s.PTS}</td>
</tr>`;
});

// Render history
let history=document.getElementById("history");

matches.forEach(m=>{
history.innerHTML+=`<div class="match">
${m[0]} ${m[2]} - ${m[3]} ${m[1]}
</div>`;
});

</script>

</body>
</html>
