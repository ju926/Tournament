<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Sports App - Malone League</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:Inter,sans-serif;
    background:#0a0f1c;
    color:white;
}.topbar{ background:#e10600; padding:12px 18px; display:flex; justify-content:space-between; align-items:center; font-weight:700; }

.live{ background:white; color:#e10600; padding:4px 10px; border-radius:20px; font-size:12px; }

.nav{ display:flex; justify-content:center; gap:15px; background:#0f172a; padding:10px; border-bottom:1px solid #1f2a44; }

.nav button{ background:none; border:none; color:#94a3b8; cursor:pointer; font-weight:600; }

.nav button.active{ color:white; border-bottom:2px solid #e10600; }

.section{display:none;padding:20px;} .section.active{display:block;}

table{ width:95%; max-width:1000px; margin:auto; border-collapse:collapse; background:#111827; border-radius:10px; overflow:hidden; }

th{ background:#1f2937; padding:12px; font-size:12px; color:#9ca3af; }

td{ padding:12px; text-align:center; border-bottom:1px solid #1f2a44; }

/* FIX: proper left alignment for player names */ td:first-child{ text-align:left; padding-left:20px; }

.player{ display:flex; gap:10px; justify-content:flex-start; align-items:center; }

.avatar{ width:28px;height:28px; border-radius:50%; background:#e10600; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; }

input,select{ padding:8px; margin:5px; border-radius:6px; border:none; }

button{ padding:10px 16px; background:#e10600; border:none; color:white; border-radius:8px; cursor:pointer; font-weight:700; }

.card{ background:#111827; padding:15px; margin:10px auto; max-width:700px; border-radius:10px; } </style>

</head>
<body><div class="topbar">
    <div>⚽ PRO SPORTS APP</div>
    <div class="live">LIVE</div>
</div><div class="nav">
    <button class="active" onclick="show('standings')">Standings</button>
    <button onclick="show('fixtures')">Fixtures</button>
    <button onclick="show('live')">Live Match</button>
</div><div id="standings" class="section active">
<h2 style="text-align:center;">League Table</h2>
<table>
<thead>
<tr>
<th>Player</th><th>P</th><th>W</th><th>D</th><th>L</th><th>Pts</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div><div id="fixtures" class="section">
<h2 style="text-align:center;">Fixtures</h2>
<div id="fixtureList" class="card"></div>
<button onclick="generateFixtures()">Generate Fixtures</button>
</div><div id="live" class="section">
<h2 style="text-align:center;">Live Match Center</h2>
<div class="card">
<input id="p1" placeholder="Player 1">
<input id="s1" placeholder="Score">
VS
<input id="s2" placeholder="Score">
<input id="p2" placeholder="Player 2">
<br>
<button onclick="addResult()">Update Live Score (Admin Only)</button>
</div>
</div><script>
const ADMIN_PASSWORD = "1234";

function stats(){return{P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0}};

let players={
"criez16":stats(),
"juki napoli":stats(),
"ckevo":stats(),
"ROMTETENASI":stats(),
"Abdnsr":stats(),
"IBRAAH. 0746521948":stats(),
"alvaro careras":stats(),
"chuckuman":stats(),
"IbnMd":stats(),
"mufasa":stats()
};

function show(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.target.classList.add('active');
}

function addResult(){
    const pass = prompt("Enter admin password:");
    if(pass !== ADMIN_PASSWORD){alert("Access denied");return;}

    let p1=document.getElementById("p1").value;
    let p2=document.getElementById("p2").value;
    let s1=Number(document.getElementById("s1").value);
    let s2=Number(document.getElementById("s2").value);

    if(!players[p1]||!players[p2]) return alert("Invalid player");

    players[p1].P++;players[p2].P++;
    players[p1].GF+=s1;players[p1].GA+=s2;
    players[p2].GF+=s2;players[p2].GA+=s1;

    if(s1>s2){players[p1].W++;players[p2].L++;players[p1].Pts+=3;}
    else if(s2>s1){players[p2].W++;players[p1].L++;players[p2].Pts+=3;}
    else{players[p1].D++;players[p2].D++;players[p1].Pts++;players[p2].Pts++;}

    render();
}

function render(){
    let body=document.getElementById("tableBody");
    body.innerHTML="";

    let sorted=Object.entries(players)
    .sort((a,b)=> b[1].Pts - a[1].Pts || (b[1].GF-b[1].GA)-(a[1].GF-a[1].GA));

    for(let [name,s] of sorted){
        let initial=name.charAt(0).toUpperCase();
        body.innerHTML+=`
        <tr>
        <td><div class='player'><div class='avatar'>${initial}</div>${name}</div></td>
        <td>${s.P}</td>
        <td>${s.W}</td>
        <td>${s.D}</td>
        <td>${s.L}</td>
        <td><b>${s.Pts}</b></td>
        </tr>`;
    }
}

function generateFixtures(){
    let keys=Object.keys(players);
    let fixtures=[];

    for(let i=0;i<keys.length;i++){
        for(let j=i+1;j<keys.length;j++){
            fixtures.push(keys[i]+" vs "+keys[j]);
        }
    }

    document.getElementById("fixtureList").innerHTML=
    fixtures.map(f=>"⚽ "+f).join("<br>");
}

render();
</script></body>
</html>
