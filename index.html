<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA Style League System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:Inter,sans-serif;
    background:#070b14;
    color:white;
}.topbar{ background:linear-gradient(90deg,#d90429,#ef233c); padding:12px 18px; display:flex; justify-content:space-between; align-items:center; font-weight:800; }

.live{ background:white; color:#d90429; padding:4px 10px; border-radius:20px; font-size:12px; }

.nav{ display:flex; justify-content:center; gap:15px; background:#0f172a; padding:10px; border-bottom:1px solid #1f2a44; }

.nav button{ background:none; border:none; color:#94a3b8; cursor:pointer; font-weight:700; }

.nav button.active{ color:white; border-bottom:2px solid #ef233c; }

.section{display:none;padding:20px;} .section.active{display:block;}

.card{ background:#0f172a; padding:15px; margin:10px auto; max-width:1000px; border-radius:10px; }

table{ width:95%; max-width:1100px; margin:auto; border-collapse:collapse; background:#0f172a; border-radius:10px; overflow:hidden; }

th{ background:#111827; padding:12px; font-size:12px; color:#9ca3af; }

td{ padding:12px; text-align:center; border-bottom:1px solid #1f2a44; }

td:first-child{ text-align:left; padding-left:20px; }

.player{ display:flex; gap:10px; align-items:center; }

.avatar{ width:28px;height:28px; border-radius:50%; background:#ef233c; display:flex; align-items:center; justify-content:center; font-weight:800; }

.form{ font-weight:800; letter-spacing:1px; }

input{ padding:8px; margin:5px; border-radius:6px; border:none; }

button{ padding:10px 16px; background:#ef233c; border:none; color:white; border-radius:8px; cursor:pointer; font-weight:800; }

.match{ padding:6px 0; border-bottom:1px solid #1f2a44; }

.upload-box{ display:flex; flex-direction:column; gap:10px; } </style>

</head>
<body><div class="topbar">
    <div>⚽ ELITE EFOOTBALL LEAGUE</div>
    <div class="live">LIVE</div>
</div><div class="nav">
    <button class="active" onclick="show('standings')">Standings</button>
    <button onclick="show('fixtures')">Fixtures</button>
    <button onclick="show('submit')">Submit Result</button>
</div><div id="standings" class="section active">
<h2 style="text-align:center;">League Table</h2>
<table>
<thead>
<tr>
<th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th><th>Form</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div><div id="fixtures" class="section">
<h2 style="text-align:center;">Fixture Schedule</h2>
<div class="card">
<button onclick="generateFixtures()">Generate Season</button>
</div>
<div id="fixtureList"></div>
</div><div id="submit" class="section">
<h2 style="text-align:center;">Submit Match Result</h2>
<div class="card upload-box">
<input id="t1" placeholder="Your Team">
<input id="t2" placeholder="Opponent Team">
<input id="s1" placeholder="Your Score">
<input id="s2" placeholder="Opponent Score"><h3>Upload Screenshot</h3>
<input type="file" id="proof"><button onclick="sendWhatsApp()">Send to Admin on WhatsApp</button>

</div>
</div><script>
const ADMIN_NUMBER="254746496906";

const teams=[
"KUKI NAPOLI","CKEVO","ROMTETENASI","ABDNSR","IBRAAH","ALVARO CARERAS",
"CHUCKUMAN","LBNMD","MUFASA","CRIEZ16","CENTRYGAMER🎮"
];

let players={};
teams.forEach(t=>players[t]={P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0,form:[]});

function show(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.target.classList.add('active');
}

function sendWhatsApp(){
    let t1=document.getElementById("t1").value;
    let t2=document.getElementById("t2").value;
    let s1=document.getElementById("s1").value;
    let s2=document.getElementById("s2").value;

    let file=document.getElementById("proof").files[0];
    let fileName=file?file.name:"No screenshot";

    let msg=`⚽ MATCH RESULT\n${t1} ${s1} - ${s2} ${t2}\n📸 ${fileName}`;
    let url=`https://wa.me/${ADMIN_NUMBER}?text=${encodeURIComponent(msg)}`;
    window.open(url,"_blank");
}

function updateForm(team,res){
    let f=players[team].form;
    f.unshift(res);
    if(f.length>5) f.pop();
}

function render(){
    let body=document.getElementById("tableBody");
    body.innerHTML="";

    let sorted=Object.entries(players).sort((a,b)=>b[1].Pts-a[1].Pts);

    sorted.forEach(([n,s])=>{
        let gd=s.GF-s.GA;
        let form=s.form.join('')||"-";

        body.innerHTML+=`
        <tr>
        <td><div class='player'><div class='avatar'>${n[0]}</div>${n}</div></td>
        <td>${s.P}</td><td>${s.W}</td><td>${s.D}</td><td>${s.L}</td>
        <td>${s.GF}</td><td>${s.GA}</td><td>${gd}</td><td><b>${s.Pts}</b></td>
        <td class='form'>${form}</td>
        </tr>`;
    });
}

function generateFixtures(){
    let list=[...teams];
    if(list.length%2) list.push("BYE");

    let n=list.length;
    let rounds=[];

    for(let r=0;r<n-1;r++){
        let round=[];
        for(let i=0;i<n/2;i++){
            let a=list[i],b=list[n-1-i];
            if(a!=="BYE"&&b!=="BYE") round.push(a+" vs "+b);
        }
        rounds.push(round);
        list.splice(1,0,list.pop());
    }

    let c=document.getElementById("fixtureList");
    c.innerHTML="";

    rounds.forEach((r,i)=>{
        c.innerHTML+=`<div class='matchday'>MATCHDAY ${i+1}</div>`;
        r.forEach(m=>c.innerHTML+=`<div class='match'>⚽ ${m}</div>`);
    });
}

render();
</script></body>
    </html>
