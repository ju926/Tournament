<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA Style League System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:Inter,sans-serif;
    background:#070b14;
    color:white;
}.topbar{ background:linear-gradient(90deg,#d90429,#ef233c); padding:12px 18px; display:flex; justify-content:space-between; align-items:center; font-weight:800; }

.live{ background:white; color:#d90429; padding:4px 10px; border-radius:20px; font-size:12px; }

.nav{ display:flex; justify-content:center; gap:15px; background:#0f172a; padding:10px; border-bottom:1px solid #1f2a44; }

.nav button{ background:none; border:none; color:#94a3b8; cursor:pointer; font-weight:700; }

.nav button.active{ color:white; border-bottom:2px solid #ef233c; }

.section{display:none;padding:20px;} .section.active{display:block;}

.card{ background:#0f172a; padding:15px; margin:10px auto; max-width:1000px; border-radius:10px; }

table{ width:95%; max-width:1100px; margin:auto; border-collapse:collapse; background:#0f172a; border-radius:10px; overflow:hidden; }

th{ background:#111827; padding:12px; font-size:12px; color:#9ca3af; }

td{ padding:12px; text-align:center; border-bottom:1px solid #1f2a44; }

td:first-child{ text-align:left; padding-left:20px; }

.player{ display:flex; gap:10px; align-items:center; }

.avatar{ width:28px;height:28px; border-radius:50%; background:#ef233c; display:flex; align-items:center; justify-content:center; font-weight:800; }

input{ padding:8px; margin:5px; border-radius:6px; border:none; }

button{ padding:10px 16px; background:#ef233c; border:none; color:white; border-radius:8px; cursor:pointer; font-weight:800; }

.matchday{ margin-top:15px; color:#ef233c; font-weight:800; }

.match{ padding:6px 0; border-bottom:1px solid #1f2a44; }

.upload-box{ display:flex; flex-direction:column; gap:10px; }

.preview{ background:#111827; padding:10px; border-radius:10px; } </style>

</head>
<body><div class="topbar">
    <div>⚽ FIFA STYLE LEAGUE SYSTEM</div>
    <div class="live">LIVE</div>
</div><div class="nav">
    <button class="active" onclick="show('standings')">Standings</button>
    <button onclick="show('fixtures')">Fixtures</button>
    <button onclick="show('submit')">Submit Result</button>
    <button onclick="show('admin')">Admin Panel</button>
</div><!-- STANDINGS --><div id="standings" class="section active">
<h2 style="text-align:center;">League Table</h2>
<table>
<thead>
<tr>
<th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div><!-- FIXTURES --><div id="fixtures" class="section">
<h2 style="text-align:center;">Fixture Schedule</h2>
<div class="card">
<button onclick="generateFixtures()">Generate Season</button>
</div>
<div id="fixtureList"></div>
</div><!-- SUBMIT RESULT (PLAYERS) --><div id="submit" class="section">
<h2 style="text-align:center;">Submit Match Result</h2>
<div class="card upload-box">
<input placeholder="Your Team Name" id="t1">
<input placeholder="Opponent Team Name" id="t2">
<input placeholder="Your Score" id="s1">
<input placeholder="Opponent Score" id="s2"><h3>Upload Screenshot (Proof)</h3>
<input type="file" id="proof"><button onclick="submitResult()">Submit for Review</button>

</div>
</div><!-- ADMIN --><div id="admin" class="section">
<h2 style="text-align:center;">Admin Review Panel</h2>
<div class="card">
<p>Submitted results will appear here (mock system)</p>
<div id="adminList"></div>
</div>
</div><script>
const ADMIN_PASSWORD="1234";

const teams=[
"KUKI NAPOLI","CKEVO","ROMTETENASI","ABDNSR","IBRAAH","ALVARO CARERAS",
"CHUCKUMAN","LBNMD","MUFASA","CRIEZ16","CENTRYGAMER🎮"
];

let players={};
teams.forEach(t=>players[t]={P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0});

let submissions=[];

function show(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.target.classList.add('active');
}

function submitResult(){
    let data={
        t1:document.getElementById("t1").value,
        t2:document.getElementById("t2").value,
        s1:document.getElementById("s1").value,
        s2:document.getElementById("s2").value,
        proof:document.getElementById("proof").files[0]?.name || "No image",
        status:"Pending"
    };

    submissions.push(data);
    alert("Submitted! Waiting for admin approval.");
    renderAdmin();
}

function renderAdmin(){
    let box=document.getElementById("adminList");
    box.innerHTML="";

    submissions.forEach((s,i)=>{
        box.innerHTML+=`
        <div class='preview'>
        <b>${s.t1} ${s.s1} - ${s.s2} ${s.t2}</b><br>
        Proof: ${s.proof}<br>
        Status: ${s.status}<br>
        <button onclick="approve(${i})">Approve</button>
        </div>
        `;
    });
}

function approve(i){
    let m=submissions[i];

    let p1=players[m.t1];
    let p2=players[m.t2];

    if(!p1||!p2){alert("Invalid teams");return;}

    let s1=Number(m.s1);
    let s2=Number(m.s2);

    p1.P++;p2.P++;
    p1.GF+=s1;p1.GA+=s2;
    p2.GF+=s2;p2.GA+=s1;

    if(s1>s2){p1.W++;p2.L++;p1.Pts+=3;}
    else if(s2>s1){p2.W++;p1.L++;p2.Pts+=3;}
    else{p1.D++;p2.D++;p1.Pts++;p2.Pts++;}

    m.status="Approved";

    render();
    renderAdmin();
}

function render(){
    let body=document.getElementById("tableBody");
    body.innerHTML="";

    let sorted=Object.entries(players).sort((a,b)=>b[1].Pts-a[1].Pts);

    sorted.forEach(([n,s])=>{
        let gd=s.GF-s.GA;
        body.innerHTML+=`
        <tr>
        <td><div class='player'><div class='avatar'>${n[0]}</div>${n}</div></td>
        <td>${s.P}</td><td>${s.W}</td><td>${s.D}</td><td>${s.L}</td>
        <td>${s.GF}</td><td>${s.GA}</td><td>${gd}</td><td><b>${s.Pts}</b></td>
        </tr>`;
    });
}

function generateFixtures(){
    let list=[...teams];
    if(list.length%2) list.push("BYE");

    let n=list.length;
    let rounds=[];

    for(let r=0;r<n-1;r++){
        let round=[];
        for(let i=0;i<n/2;i++){
            let a=list[i],b=list[n-1-i];
            if(a!=="BYE"&&b!=="BYE") round.push(a+" vs "+b);
        }
        rounds.push(round);
        list.splice(1,0,list.pop());
    }

    let c=document.getElementById("fixtureList");
    c.innerHTML="";

    rounds.forEach((r,i)=>{
        c.innerHTML+=`<div class='matchday'>MATCHDAY ${i+1}</div>`;
        r.forEach(m=>c.innerHTML+=`<div class='match'>⚽ ${m}</div>`);
    });
}

render();
</script></body>
</html>
