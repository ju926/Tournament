<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELITE EFOOTBALL LEAGUE</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:Inter,sans-serif;
    background: radial-gradient(circle at top,#0b1220,#05070f);
    color:white;
}.topbar{ background: linear-gradient(90deg,#d90429,#ef233c); padding:14px 18px; display:flex; justify-content:space-between; align-items:center; font-weight:900; letter-spacing:1px; box-shadow:0 10px 30px rgba(0,0,0,0.4); }

.live{ background:white; color:#d90429; padding:5px 12px; border-radius:999px; font-size:12px; font-weight:800; animation:pulse 1.5s infinite; }

@keyframes pulse{ 0%{transform:scale(1);opacity:1;} 50%{transform:scale(1.05);opacity:0.7;} 100%{transform:scale(1);opacity:1;} }

.nav{ display:flex; justify-content:center; gap:20px; background:#0c1426; padding:12px; border-bottom:1px solid #1f2a44; }

.nav button{ background:none; border:none; color:#94a3b8; cursor:pointer; font-weight:800; padding:10px 14px; border-radius:10px; transition:0.3s; }

.nav button:hover{ background:#111c33; color:white; }

.nav button.active{ color:white; background:#ef233c; }

.section{display:none;padding:20px;} .section.active{display:block;}

.card{ background:rgba(15,23,42,0.9); padding:18px; margin:15px auto; max-width:1000px; border-radius:14px; box-shadow:0 10px 40px rgba(0,0,0,0.4); backdrop-filter: blur(10px); }

table{ width:95%; max-width:1100px; margin:auto; border-collapse:collapse; background:#0f172a; border-radius:12px; overflow:hidden; }

th{ background:#111827; padding:14px; font-size:12px; color:#9ca3af; text-transform:uppercase; }

td{ padding:14px; text-align:center; border-bottom:1px solid #1f2a44; }

td:first-child{ text-align:left; padding-left:18px; }

.player{ display:flex; gap:10px; align-items:center; font-weight:700; }

.avatar{ width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,#ef233c,#ff6b6b); display:flex; align-items:center; justify-content:center; font-weight:900; }

.form{ font-weight:900; letter-spacing:2px; }

/* FIXTURES */ .matchday{ margin:18px 0 8px; color:#ff4d6d; font-weight:900; font-size:14px; }

.match{ background:#111827; margin:8px 0; padding:12px; border-radius:10px; border-left:4px solid #ef233c; transition:0.3s; }

.match:hover{ transform:scale(1.01); background:#16213a; }

/* FORM INPUTS */ input{ padding:10px; margin:6px; border-radius:10px; border:none; background:#0b1220; color:white; outline:none; width:calc(100% - 20px); }

input:focus{ border:1px solid #ef233c; }

button{ padding:12px 18px; background:linear-gradient(90deg,#ef233c,#ff4d6d); border:none; color:white; border-radius:10px; cursor:pointer; font-weight:900; margin-top:10px; width:100%; transition:0.3s; }

button:hover{ transform:scale(1.02); }

/* FILE UPLOAD BEAUTIFY */ input[type="file"]{ padding:12px; background:#0b1220; border:2px dashed #ef233c; cursor:pointer; }

.upload-box h3{ margin-top:10px; color:#ff4d6d; }

</style>
</head>
<body><div class="topbar">
    <div>⚽ ELITE EFOOTBALL LEAGUE</div>
    <div class="live">LIVE</div>
</div><div class="nav">
    <button class="active" onclick="show('standings')">Standings</button>
    <button onclick="show('fixtures')">Fixtures</button>
    <button onclick="show('submit')">Submit Result</button>
</div><!-- STANDINGS --><div id="standings" class="section active">
<h2 style="text-align:center;">League Table</h2>
<div class="card">
<table>
<thead>
<tr>
<th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th><th>Form</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>
</div><!-- FIXTURES --><div id="fixtures" class="section">
<h2 style="text-align:center;">Fixture Schedule</h2>
<div class="card">
<button onclick="generateFixtures()">Generate Season</button>
</div>
<div class="card" id="fixtureList"></div>
</div><!-- SUBMIT --><div id="submit" class="section">
<h2 style="text-align:center;">Submit Match Result</h2>
<div class="card upload-box">
<input id="t1" placeholder="Your Team">
<input id="t2" placeholder="Opponent Team">
<input id="s1" placeholder="Your Score">
<input id="s2" placeholder="Opponent Score"><h3>Upload Screenshot Proof</h3>
<input type="file" id="proof"><button onclick="sendWhatsApp()">Send to Admin on WhatsApp</button>

</div>
</div><script>
const ADMIN_NUMBER="254746496906";

const teams=[
"KUKI NAPOLI","CKEVO","ROMTETENASI","ABDNSR","IBRAAH","ALVARO CARERAS",
"CHUCKUMAN","LBNMD","MUFASA","CRIEZ16","CENTRYGAMER🎮"
];

let players={};
teams.forEach(t=>players[t]={P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0,form:[]});

function show(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.target.classList.add('active');
}

function sendWhatsApp(){
    let t1=t1=document.getElementById("t1").value;
    let t2=document.getElementById("t2").value;
    let s1=document.getElementById("s1").value;
    let s2=document.getElementById("s2").value;

    let file=document.getElementById("proof").files[0];
    let fileName=file?file.name:"No screenshot";

    let msg=`⚽ ELITE MATCH RESULT\n\n${t1} ${s1} - ${s2} ${t2}\n📸 Proof: ${fileName}`;

    let url=`https://wa.me/${ADMIN_NUMBER}?text=${encodeURIComponent(msg)}`;
    window.open(url,"_blank");
}

function render(){
    let body=document.getElementById("tableBody");
    body.innerHTML="";

    let sorted=Object.entries(players).sort((a,b)=>b[1].Pts-a[1].Pts);

    sorted.forEach(([n,s])=>{
        let gd=s.GF-s.GA;
        body.innerHTML+=`
        <tr>
        <td><div class='player'><div class='avatar'>${n[0]}</div>${n}</div></td>
        <td>${s.P}</td><td>${s.W}</td><td>${s.D}</td><td>${s.L}</td>
        <td>${s.GF}</td><td>${s.GA}</td><td>${gd}</td><td><b>${s.Pts}</b></td>
        <td class='form'>${s.form.join(' ')||'-'}</td>
        </tr>`;
    });
}

function generateFixtures(){
    let list=[...teams];
    if(list.length%2) list.push("BYE");

    let n=list.length;
    let rounds=[];

    for(let r=0;r<n-1;r++){
        let round=[];
        for(let i=0;i<n/2;i++){
            let a=list[i],b=list[n-1-i];
            if(a!=="BYE"&&b!=="BYE") round.push(a+" vs "+b);
        }
        rounds.push(round);
        list.splice(1,0,list.pop());
    }

    let c=document.getElementById("fixtureList");
    c.innerHTML="";

    rounds.forEach((r,i)=>{
        c.innerHTML+=`<div class='matchday'>MATCHDAY ${i+1}</div>`;
        r.forEach(m=>c.innerHTML+=`<div class='match'>⚽ ${m}</div>`);
    });
}

render();
</script></body>
    </html>
