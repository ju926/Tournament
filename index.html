<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ELITE EFOOTBALL LEAGUE PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white;}
h1{background:linear-gradient(90deg,#ef233c,#ff4d6d);padding:15px;text-align:center;margin:0;}

.nav{display:flex;background:#111;}
.nav button{flex:1;padding:12px;border:none;background:none;color:white;font-weight:bold;cursor:pointer;}
.nav button.active{background:#ef233c;}

.section{display:none;padding:15px;}
.active{display:block;}

.card{background:#111;padding:15px;margin:10px 0;border-radius:10px;}

table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #333;text-align:center;white-space:nowrap;}
td:first-child{text-align:left;}

.match{background:#1a1a1a;padding:10px;margin:5px 0;border-left:3px solid #ef233c;border-radius:6px;}
.matchday-title{color:#ff4d6d;font-weight:bold;margin:10px 0;}

select,input{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none;background:#0b1220;color:white;}

button.main{background:linear-gradient(90deg,#ef233c,#ff4d6d);color:white;border:none;padding:12px;width:100%;border-radius:8px;font-weight:bold;}

.file-label{display:block;border:2px dashed #ef233c;padding:12px;text-align:center;border-radius:8px;color:#ff4d6d;cursor:pointer;}
</style>
</head>

<body>

<h1>⚽ ELITE EFOOTBALL LEAGUE PRO</h1>

<div class="nav">
<button onclick="show('standings',this)" class="active">Standings</button>
<button onclick="show('fixtures',this)">Fixtures</button>
<button onclick="show('submit',this)">Submit</button>
</div>

<!-- STANDINGS -->
<div id="standings" class="section active">
<div class="card">
<table>
<thead>
<tr>
<th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>
</div>

<!-- FIXTURES -->
<div id="fixtures" class="section">

<div class="card">
<button class="main" onclick="generateFixtures()">Generate Season Fixtures</button>
</div>

<div class="card">
<label>Select Matchday</label>
<select id="mdSelect" onchange="renderFixtures()">
<option value="1">Matchday 1</option>
<option value="2">Matchday 2</option>
<option value="3">Matchday 3</option>
<option value="4">Matchday 4</option>
<option value="5">Matchday 5</option>
<option value="6">Matchday 6</option>
<option value="7">Matchday 7</option>
<option value="8">Matchday 8</option>
<option value="9">Matchday 9</option>
<option value="10">Matchday 10</option>
<option value="11">Matchday 11</option>
<option value="12">Matchday 12</option>
<option value="13">Matchday 13</option>
</select>
</div>

<div class="card" id="fixtureList"></div>

</div>

<!-- SUBMIT -->
<div id="submit" class="section">
<div class="card">
<input placeholder="Team 1">
<input placeholder="Team 2">
<input placeholder="Score 1">
<input placeholder="Score 2">
<select>
<option>Select Matchday</option>
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>7</option><option>8</option><option>9</option>
<option>10</option><option>11</option><option>12</option><option>13</option>
</select>

<label class="file-label">📸 Upload Screenshot</label>
<button class="main">Send Result</button>
</div>
</div>

<script>

const teams=[
"JUKI NAPOLI","CKEVO","ROMTETENASI","ABDNSR","IBRAAH",
"ALVARO CARERAS","CHUCKUMAN","LBNMD","MUFASA",
"CRIEZ16","CENTRYGAMER","BLACK ROSE",
"DERICK MULTITASKER","HUNTER LOVE"
];

let fullFixtures=[];

/* FIXTURE GENERATION (NO RETURN LEG) */
function generateFixtures(){
let list=[...teams];
let rounds=[];
let n=list.length;

for(let r=0;r<n-1;r++){
let round=[];
for(let i=0;i<n/2;i++){
round.push(`${list[i]} vs ${list[n-1-i]}`);
}
rounds.push(round);
list.splice(1,0,list.pop());
}

fullFixtures=rounds;
document.getElementById("mdSelect").value=1;
renderFixtures();
}

/* FIXTURE DISPLAY (SAFE - NO MD1 DAMAGE) */
function renderFixtures(){
if(fullFixtures.length===0){
document.getElementById("fixtureList").innerHTML=
"<div class='match'>Generate fixtures first</div>";
return;
}

let md=parseInt(document.getElementById("mdSelect").value);
let box=document.getElementById("fixtureList");
box.innerHTML="";

let fixtures=fullFixtures[md-1];

if(md===1){
box.innerHTML=`
<div class='matchday-title'>MATCHDAY 1 (COMPLETED & LOCKED)</div>
<div class='match'>Results already recorded in standings</div>
`;
return;
}

box.innerHTML=`<div class='matchday-title'>MATCHDAY ${md}</div>`;
fixtures.forEach(m=>{
box.innerHTML+=`<div class='match'>${m}</div>`;
});
}

/* NAV */
function show(id,btn){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

</script>

</body>
</html>
